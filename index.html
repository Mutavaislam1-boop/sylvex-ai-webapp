function fillSelect(id, values){

    const select = document.getElementById(id);

    select.innerHTML = "";

    values.forEach(value => {

        const option = document.createElement("option");

        option.value = value;

        option.textContent = value;

        select.appendChild(option);

    });

}

function selectFormat(card){

    document.querySelectorAll(".format-card")

        .forEach(el => {

            el.classList.remove("selected");

        });

    card.classList.add("selected");

}

function setFormatOptions(ratios){

    const cards = document.querySelectorAll(".format-card");

    cards.forEach(card => {

        const ratio = card.dataset.ratio;

        if(ratios.includes(ratio)){

            card.classList.remove("hidden");

        }else{

            card.classList.add("hidden");

            card.classList.remove("selected");

        }

    });

    let selected = document.querySelector(".format-card.selected:not(.hidden)");

    if(!selected){

        const firstVisible = document.querySelector(".format-card:not(.hidden)");

        if(firstVisible){

            firstVisible.classList.add("selected");

        }

    }

}

function renderExtraSettings(extras){

    const box = document.getElementById("extraSettings");

    box.innerHTML = "";

    if(!extras || extras.length === 0){

        return;

    }

    const title = document.createElement("div");

    title.className = "extra-title";

    title.textContent = "Дополнительные настройки";

    box.appendChild(title);

    extras.forEach(item => {

        const section = document.createElement("div");

        section.className = "section";

        const label = document.createElement("label");

        label.textContent = item.label;

        section.appendChild(label);

        if(item.type === "select"){

            const select = document.createElement("select");

            select.id = item.id;

            select.className = "extra-setting";

            item.options.forEach(optionText => {

                const option = document.createElement("option");

                option.value = optionText;

                option.textContent = optionText;

                select.appendChild(option);

            });

            section.appendChild(select);

        }

        box.appendChild(section);

    });

}

        document.getElementById(sectionId).classList.remove("hidden");

    if(providerData.hideCommon){

            const sectionId = COMMON_SECTIONS[key];

            if(sectionId){

                document.getElementById(sectionId).classList.add("hidden");

            }

        });

    }

}

function loadProviderSettings(){

    const provider = document.getElementById("provider").value;

    const data = AI_SETTINGS[provider];

    document.getElementById("pageTitle").textContent = data.title;

    fillSelect("model", data.models);

    fillSelect("mode", data.modes);

    fillSelect("duration", data.durations);

    fillSelect("resolution", data.resolutions);

    fillSelect("camera", data.cameras);

    setFormatOptions(data.ratios);

    renderExtraSettings(data.extras);

    showCommonSections(data);

    document.getElementById("priceBox").textContent = "💎 Стоимость: " + data.price;

    const soundRow = document.getElementById("soundRow");

    if(provider === "topaz"){

        soundRow.classList.add("hidden");

    }else{

        soundRow.classList.remove("hidden");

    }

}

function getExtraSettings(){

    const result = {};

    document.querySelectorAll(".extra-setting").forEach(el => {

        result[el.id] = el.value;

    });

    return result;

}

function getValueOrNull(id){

    const el = document.getElementById(id);

    if(!el || el.closest(".hidden")){

        return null;

    }

    return el.value;

}

function getCheckedOrNull(id){

    const el = document.getElementById(id);

    if(!el || el.closest(".hidden")){

        return null;

    }

    return el.checked;

}

async function saveSettings() {

    const tg = window.Telegram.WebApp;

    const user = tg.initDataUnsafe.user;

    const providerKey = document.querySelector("#provider").value;

    const providerData = AI_SETTINGS[providerKey];

    const selectedFormat = document.querySelector(".format-card.selected");

    const data = {

        telegram_id: user ? user.id : null,

        message_id: new URLSearchParams(window.location.search).get("message_id"),

        provider: providerKey,

        provider_name: providerData.name,

        model: document.querySelector("#model").value,

        mode: document.querySelector("#mode").value,

        ratio: selectedFormat ? selectedFormat.dataset.ratio : "Original",

        resolution: document.querySelector("#resolution").value,

        duration: document.querySelector("#duration").value,

        quality: getValueOrNull("quality"),

        style: getValueOrNull("style"),

        realism: getValueOrNull("realism"),

        motion: getValueOrNull("motion"),

        camera: getValueOrNull("camera"),

        fps: getValueOrNull("fps"),

        prompt_strength: getValueOrNull("prompt_strength"),

        negative_prompt: getValueOrNull("negative_prompt"),

        seed: getValueOrNull("seed"),

        sound: getCheckedOrNull("sound"),

        prompt_enhance: getCheckedOrNull("prompt_enhance"),

        character_consistency: getCheckedOrNull("character_consistency"),

        reference_image: getCheckedOrNull("reference_image"),

        extra_settings: getExtraSettings()

    };

    await fetch("/save-settings", {

        method: "POST",

        headers: {

            "Content-Type": "application/json"

        },

        body: JSON.stringify(data)

    });

    tg.sendData(JSON.stringify(data));

    setTimeout(() => {

        tg.close();

    }, 500);

}

function initProviders(){

    const providerSelect = document.getElementById("provider");

    providerSelect.innerHTML = "";

    Object.keys(AI_SETTINGS).forEach(key => {

        const option = document.createElement("option");

        option.value = key;

        option.textContent = AI_SETTINGS[key].name;

        providerSelect.appendChild(option);

    });

    loadProviderSettings();

}

document.addEventListener("DOMContentLoaded", initProviders);

</script>
