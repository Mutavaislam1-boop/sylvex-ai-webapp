<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SYLVEX AI - Kling</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="/css/cabinet.css" />

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100vh;
    background-image:url("image/background.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.75);
}

.card{
    position:relative;
    z-index:1;
    width:95%;
    max-width:550px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);
    border-radius:24px;
    padding:25px;
    color:white;
}

h1{
    text-align:center;
    margin-top:0;
}

.section{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
    opacity:0.9;
}

select{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:white;
}

.switch-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.switch-row input{
    width:22px;
    height:22px;
}

.price{
    text-align:center;
    background:rgba(45,127,255,0.2);
    padding:15px;
    border-radius:14px;
    margin-top:15px;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:14px;
    background:#2d7fff;
    color:white;
    font-size:16px;
    font-weight:bold;
}

.format-grid{
    display:flex;
    gap:12px;
    margin-top:10px;
}

.format-card{
    flex:1;
    background:rgba(255,255,255,0.08);
    border:2px solid rgba(255,255,255,0.15);
    border-radius:16px;
    padding:15px;
    cursor:pointer;
    text-align:center;
    transition:0.2s;
}

.format-card.selected{
    border-color:#2d7fff;
    background:rgba(45,127,255,0.25);
    box-shadow:0 0 20px rgba(45,127,255,0.5);
    transform:translateY(-2px);
}

.format-card:hover{
    border-color:#2d7fff;
    transform:translateY(-2px);
}

.frame-169{
    width:60px;
    height:34px;
    border:2px solid white;
    margin:auto;
    margin-bottom:10px;
}

.frame-11{
    width:45px;
    height:45px;
    border:2px solid white;
    margin:auto;
    margin-bottom:10px;
}

.frame-916{
    width:30px;
    height:55px;
    border:2px solid white;
    margin:auto;
    margin-bottom:10px;
}
</style>

</head>

<body>

<div class="card">

<h1>⚙️ Kling Settings</h1>

<div class="section">
<label>Модель</label>
<select id="model">
<option>Kling 3.0 Turbo</option>
<option>Kling 3.0 Master</option>
</select>
</div>

<div class="section">
<label>Режим генерации</label>
<select id="mode">
<option>Text → Video</option>
<option>Image → Video</option>
</select>
</div>

<div class="section">

<label>Формат видео</label>

<div class="format-grid">

    <div class="format-card selected" data-ratio="16:9" onclick="selectFormat(this)">
        <div class="frame-169"></div>
        <div>16:9</div>
    </div>

    <div class="format-card" data-ratio="1:1" onclick="selectFormat(this)">
        <div class="frame-11"></div>
        <div>1:1</div>
    </div>

    <div class="format-card" data-ratio="9:16" onclick="selectFormat(this)">
        <div class="frame-916"></div>
        <div>9:16</div>
    </div>

</div>

</div>

<div class="section">
<label>Качество</label>
<select id="quality">
<option>Standard</option>
<option>Professional</option>
</select>
</div>

<div class="section">
<label>Длительность</label>
<select id="duration">
<option>5 секунд</option>
<option>10 секунд</option>
</select>
</div>

<div class="switch-row">
<span>🔊 Звук</span>
<input id="sound" type="checkbox" checked>
</div>

<div class="switch-row">
<span>✨ Prompt Enhance</span>
<input id="prompt_enhance" type="checkbox" checked>
</div>

<div class="price">
💎 Стоимость: 100 Credits
</div>

<button onclick="saveSettings()">
СОХРАНИТЬ НАСТРОЙКИ
</button>

</div>

<script>
function selectFormat(card){
    document.querySelectorAll(".format-card")
        .forEach(el => {
            el.classList.remove("selected");
        });

    card.classList.add("selected");
}

async function saveSettings() {

    const tg = window.Telegram.WebApp;
    const user = tg.initDataUnsafe.user;

    const data = {
        telegram_id: user ? user.id : null,
        message_id: new URLSearchParams(window.location.search).get("message_id"),
        provider: "kling",
        model: document.querySelector("#model").value,
        mode: document.querySelector("#mode").value,
        ratio: document.querySelector(".format-card.selected").dataset.ratio,
        quality: document.querySelector("#quality").value,
        duration: document.querySelector("#duration").value,
        sound: document.querySelector("#sound").checked,
        prompt_enhance: document.querySelector("#prompt_enhance").checked
    };

    const response = await fetch("/save-settings", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    });

    console.log("SAVE STATUS:", response.status);

    const result = await response.text();
    console.log("SAVE RESPONSE:", result);

    setTimeout(() => {
        tg.close();
    }, 500);
}
</script>

</body>
</html>
