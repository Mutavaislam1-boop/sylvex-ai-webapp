<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>SYLVEX — ElevenLabs</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="/css/cabinet.css">
</head>
<body>
<div id="toast" class="toast"></div>

<div class="app elevenlabs-app">
  <header class="topbar">
    <div class="brand">
      <div class="brand-logo" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3 6 6.5 1-4.7 4.6 1.1 6.4L12 17l-5.9 3 1.1-6.4L2.5 9 9 8z"/></svg>
      </div>
      <div class="brand-name">SYLVEX</div>
    </div>
  </header>

  <main class="scroll elevenlabs-scroll">
    <section class="payment-hero">
      <div class="payment-kicker">Озвучка</div>
      <h1>ElevenLabs Voice</h1>
      <p>Выберите голос и базовые параметры. После сохранения вернитесь в бот и отправьте текст.</p>
    </section>

    <section class="payment-panel elevenlabs-panel">
      <label class="voice-field">
        <span>Модель</span>
        <select id="modelSelect"></select>
      </label>

      <label class="voice-field">
        <span>Тип голоса</span>
        <select id="voiceTypeSelect">
          <option value="all">Все голоса</option>
          <option value="male">Мужской</option>
          <option value="female">Женский</option>
          <option value="narration">Диктор</option>
          <option value="character">Персонаж</option>
        </select>
      </label>

      <label class="voice-field">
        <span>Голос</span>
        <select id="voiceSelect"></select>
      </label>

      <label class="voice-field">
        <span>Язык</span>
        <select id="languageSelect">
          <option value="ru">Русский</option>
          <option value="en">English</option>
          <option value="uk">Українська</option>
          <option value="tr">Türkçe</option>
          <option value="kk">Қазақша</option>
          <option value="de">Deutsch</option>
          <option value="pl">Polski</option>
          <option value="it">Italiano</option>
          <option value="fr">Français</option>
          <option value="ar">العربية</option>
        </select>
      </label>

      <div class="voice-sliders">
        <label class="voice-slider">
          <span>Стабильность <b id="stabilityValue">0.50</b></span>
          <input id="stabilityInput" type="range" min="0" max="1" step="0.05" value="0.5">
        </label>
        <label class="voice-slider">
          <span>Похожесть <b id="similarityValue">0.75</b></span>
          <input id="similarityInput" type="range" min="0" max="1" step="0.05" value="0.75">
        </label>
        <label class="voice-slider">
          <span>Стиль <b id="styleValue">0.00</b></span>
          <input id="styleInput" type="range" min="0" max="1" step="0.05" value="0">
        </label>
        <label class="voice-slider">
          <span>Скорость <b id="speedValue">1.00</b></span>
          <input id="speedInput" type="range" min="0.7" max="1.2" step="0.05" value="1">
        </label>
      </div>

      <label class="voice-toggle">
        <span>Speaker Boost</span>
        <input id="speakerBoostInput" type="checkbox" checked>
      </label>

      <div class="voice-actions">
        <button class="btn-primary" id="saveButton" type="button">Сохранить</button>
      </div>
    </section>
  </main>
</div>

<script src="/js/telegram.js"></script>
<script src="/js/ui.js"></script>
<script src="/js/elevenlabs.js"></script>
</body>
</html>
