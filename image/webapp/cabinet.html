<script>
const tg = window.Telegram?.WebApp;

if (tg) {
  tg.ready();
  tg.expand();
}

document.getElementById("backBtn").addEventListener("click", () => {
  if (tg) tg.close();
  else window.history.back();
});

const user = tg?.initDataUnsafe?.user;
const telegramId = user?.id;

async function loadCabinet() {
  if (!telegramId) return;

  const response = await fetch(`/api/cabinet/${telegramId}`);
  const data = await response.json();

  if (!data.success) return;

  const u = data.user;

  document.getElementById("avatarText").textContent = (u.first_name || "S")[0];
  document.getElementById("userName").textContent = u.first_name || "User";
  document.getElementById("userId").textContent = `ID: ${u.telegram_id}`;
  document.getElementById("regDate").textContent = `Дата регистрации: ${u.created_at || "-"}`;
  document.getElementById("balance").textContent = `${u.balance} ⭐`;
  document.getElementById("totalGenerations").textContent = u.total_generations;
  document.getElementById("subscription").textContent = u.subscription;

  const list = document.getElementById("generationsList");
  list.innerHTML = "";

  if (!data.generations.length) {
    list.innerHTML = `<p class="no-generations">История пока пустая</p>`;
    return;
  }

  data.generations.forEach(gen => {
    list.innerHTML += `
      <div class="generation-item">
        <div class="gen-header">
          <span class="gen-type">${gen.generation_type}</span>
          <span class="gen-status" data-status="${gen.status}">${gen.status}</span>
        </div>
        <p class="gen-prompt">${gen.prompt}</p>
        <span class="gen-date">${gen.created_at}</span>
      </div>
    `;
  });
}

loadCabinet();
</script>
