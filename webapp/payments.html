<!DOCTYPE html>
<html lang="ru" data-theme="dark" data-lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>SYLVEX — Payments</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="/css/cabinet.css">
</head>

<body>
<div id="toast" class="toast"></div>

<div class="app payment-app">
  <header class="topbar">
    <div class="brand">
      <div class="brand-logo" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2l3 6 6.5 1-4.7 4.6 1.1 6.4L12 17l-5.9 3 1.1-6.4L2.5 9 9 8z"/>
        </svg>
      </div>
      <div class="brand-name">SYLVEX</div>
    </div>
  </header>

  <main class="scroll payment-scroll">
    <section class="payment-hero">
      <div class="payment-kicker">Оплата банковской картой</div>
      <h1>Выберите продукт SYLVEX</h1>
      <p>Выберите подписку или пакет ⚡ и перейдите к безопасной оплате банковской картой.</p>
    </section>

    <section class="payment-panel">
      <div class="section-title payment-title">
        <h3>Доступные товары</h3>
      </div>

      <div class="payment-grid" id="paymentGrid">
        <article class="payment-pack">
          <div class="payment-label">Загрузка</div>
          <p class="payment-desc">Получаем товары SYLVEX...</p>
        </article>
      </div>
    </section>
  </main>
</div>

<script src="/js/telegram.js"></script>
<script src="/js/ui.js"></script>
<script src="/js/payments.js"></script>
</body>
</html>
