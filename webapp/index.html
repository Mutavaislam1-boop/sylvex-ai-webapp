<!DOCTYPE html>
<html lang="en" data-theme="dark" data-lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>SYLVEX — Telegram Mini App</title>
<link rel="stylesheet" href="styles.css" />
<link rel="stylesheet" href="css/cabinet.css" />
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
<div id="toast" class="toast"></div>
<div id="app-root"></div>

<script src="js/telegram.js"></script>
<script src="js/language.js"></script>
<script src="js/data.js"></script>
<script src="js/ui.js"></script>
<script src="js/user.js"></script>
<script src="js/cabinet.js"></script>
<script>
  // Load the cabinet markup, then boot the app.
  fetch('cabinet.html')
    .then(r => {
      if (!r.ok) throw new Error('Failed to load cabinet.html: ' + r.status);
      return r.text();
    })
    .then(html => {
      document.getElementById('app-root').innerHTML = html;
      if (!window.SYLVEX || typeof window.SYLVEX.init !== 'function') {
        throw new Error('SYLVEX.init() is not available');
      }
      window.SYLVEX.init();
    })
    .catch(error => {
      console.error(error);
      document.getElementById('app-root').innerHTML = '<div style="padding:24px;color:#fff;font-family:system-ui">Failed to load SYLVEX. Please reopen the app.</div>';
    });
</script>
</body>
</html>
